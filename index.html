<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback Form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <h1>Feedback Form</h1>
    <p>Fill out the form below to provide us feedback!</p>

    <form id="feedback-form">
        <label for="name">Name:</label>
        <input type="text" id="name" class="field" placeholder="Input name here" required>

        <label for="email">Email:</label>
        <input type="email" id="email" class="field" placeholder="Input email here" required>

        <label for="comment">Comment:</label>
        <textarea id="comment" name="comment" class="field" placeholder="Give us a comment!" required></textarea>

        <p id = "char-count">0/500 characters</p>

        <button type="submit">Submit</button>
    </form>

    <div id = "messages"></div>

    <h2>Your Feedback:</h2>
    <div class="feedback" id="user-feedback">
        <!-- User feedback will be displayed here -->
    </div>

    <script src="cp_1.js"></script>
</body>
</html>
